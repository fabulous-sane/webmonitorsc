services:
  db:
    image: postgres:16
    container_name: webcheck-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - webcheck_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: webcheck_app
    depends_on:
      - db
    env_file:
      - .env
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    volumes:
      - .:/app
    ports:
      - "8000:8000"

volumes:
  webcheck_pgdata: